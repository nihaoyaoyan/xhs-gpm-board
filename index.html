<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书 GPM 数据看板 · 晚风店铺</title>
<style>
  :root {
    --red: #ff2442;
    --bg: #fafbfc;
    --text: #1a1a2e;
    --text-dim: #6b7280;
    --card-bg: #fff;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .container { max-width: 640px; width: 100%; padding: 40px 24px; }
  .hero { text-align: center; margin-bottom: 40px; }
  .hero h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
  .hero h1 span { background: linear-gradient(135deg, var(--red), #ff5577); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { color: var(--text-dim); font-size: 15px; }
  .cards { display: grid; gap: 16px; }
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 24px 28px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    border: 1px solid #e5e7eb;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 16px;
  }
  .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.1); transform: translateY(-2px); border-color: var(--red); }
  .card-icon { font-size: 32px; width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-icon.a { background: #fef2f2; }
  .card-icon.b { background: #fefce8; }
  .card-icon.c { background: #eef2ff; }
  .card h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .card p { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
  .card .tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; margin-top: 6px;
  }
  .tag.new { background: #ff2442; color: #fff; }
  .tag.old { background: #e5e7eb; color: #6b7280; }
  .footer { text-align: center; margin-top: 40px; font-size: 12px; color: var(--text-dim); }
  .footer a { color: var(--red); text-decoration: none; }
</style>
</head>
<body>
<div class="container">

  <div class="hero">
    <h1>小红书 <span>GPM 数据看板</span></h1>
    <p>晚风店铺 · 商品笔记绩效分析</p>
  </div>

  <div class="cards">
    <a href="gpm-report/" class="card">
      <div class="card-icon a">📊</div>
      <div>
        <h2>GPM 交互看板 <span class="tag new">2026-06</span></h2>
        <p>8 个 KPI 卡片 + 交互图表 + 明细表 · 筛选 / 搜索 / CSV 导出 · 行业优秀基准对比</p>
      </div>
    </a>

    <a href="gpm-report/report.html" class="card">
      <div class="card-icon b">📋</div>
      <div>
        <h2>GPM 分析报告</h2>
        <p>6 大板块 · 7 项核心发现 · 月度趋势解读 · 5 条优先级行动建议 · A4 打印友好</p>
      </div>
    </a>

    <a href="xhs-gpm/" class="card">
      <div class="card-icon c">📈</div>
      <div>
        <h2>旧版参考看板 <span class="tag old">历史</span></h2>
        <p>早期版本 · 包含商品 GMV 排名 / 每日趋势 / 笔记类型雷达图等更多图表</p>
      </div>
    </a>
  </div>

  <div class="footer">
    数据来源：小红书商家后台 · <a href="https://github.com/nihaoyaoyan/xhs-gpm-board">GitHub</a>
  </div>

</div>
</body>
</html>
