<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>若溪 · 小红书 GPM 分析</title>
<style>
  :root {
    --red: #ff2442;
    --bg: #fafbfc;
    --text: #1a1a2e;
    --text-dim: #6b7280;
    --card-bg: #fff;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .header {
    background: linear-gradient(135deg, var(--red), #e01b38);
    color: #fff;
    padding: 32px 40px;
    text-align: center;
  }
  .header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
  .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
  .report-list { display: flex; flex-direction: column; gap: 12px; }
  .report-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    border: 1px solid #e5e7eb;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .report-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    border-color: var(--red);
  }
  .report-date {
    font-size: 28px; font-weight: 800;
    color: var(--red);
    flex-shrink: 0;
    width: 80px; text-align: center;
    line-height: 1.2;
  }
  .report-date small { display: block; font-size: 12px; font-weight: 500; color: var(--text-dim); }
  .report-meta { flex: 1; min-width: 0; }
  .report-meta h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .report-meta p { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .report-links { display: flex; gap: 10px; flex-shrink: 0; }
  .report-links a {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 14px; border-radius: 6px;
    font-size: 13px; font-weight: 600;
    text-decoration: none;
    transition: all 0.15s;
  }
  .btn-dash { background: #fff0f2; color: var(--red); }
  .btn-dash:hover { background: var(--red); color: #fff; }
  .btn-rpt { background: #f5f5f5; color: var(--text-dim); }
  .btn-rpt:hover { background: var(--text); color: #fff; }
  .footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-dim); }
  .footer a { color: var(--red); text-decoration: none; }
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 8px 0 16px;
    font-size: 12px; font-weight: 600;
    color: var(--text-dim); letter-spacing: 1px;
  }
  .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
  @media (max-width: 640px) {
    .report-card { flex-wrap: wrap; }
    .report-links { width: 100%; justify-content: flex-end; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>若溪 · 小红书 GPM 分析</h1>
  <p>晚风店铺 · 商品笔记绩效日报</p>
</div>

<div class="container">

  <div class="divider">2026 年 6 月</div>

  <div class="report-list" id="report-list">
    <!-- Reports loaded here -->
  </div>

  <div class="footer">
    数据来源：小红书商家后台 · <a href="https://github.com/nihaoyaoyan/xhs-gpm-board">GitHub</a>
  </div>
</div>

<script>
// Auto-discover reports from reports/ directory
// For now, render from known dates
var reports = [
  {
    date: '2026-06-13',
    gmv: '¥17,147',
    orders: '169',
    notes: '1,669',
    highlights: '封面点击率 8.02%，出单率 4.97%，6月加速增长'
  }
];

var list = document.getElementById('report-list');
reports.forEach(function(r){
  var d = new Date(r.date);
  var weekday = ['日','一','二','三','四','五','六'][d.getDay()];
  var path = 'reports/' + r.date + '/';
  var v = '?v=' + r.date.replace(/-/g,'');
  list.innerHTML += 
    '<a class="report-card" href="' + path + 'dashboard.html' + v + '">' +
    '<div class="report-date">' + d.getDate() + '<small>' + (d.getMonth()+1) + '月 周' + weekday + '</small></div>' +
    '<div class="report-meta">' +
    '<h3>' + r.date + ' · 商品笔记数据画像</h3>' +
    '<p>GMV ' + r.gmv + ' · ' + r.orders + ' 单 · ' + r.notes + ' 篇笔记 · ' + r.highlights + '</p>' +
    '</div>' +
    '<div class="report-links">' +
    '<span class="btn-dash">📊 看板</span>' +
    '<span class="btn-rpt">📋 报告</span>' +
    '</div>' +
    '</a>';
});
</script>

</body>
</html>
