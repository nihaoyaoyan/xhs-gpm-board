<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>鲜水湾 · 综合数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root{--red:#ff2442;--blue:#0984e3;--green:#00b894;--yellow:#fdcb6e;--purple:#6c5ce7;--bg:#f5f6fa;--card:#fff;--text:#2d3436;--sub:#636e72;--border:#e5e7eb;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,var(--blue) 0%,#0066cc 50%,#0044aa 100%);color:#fff;padding:20px 32px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px rgba(9,132,227,.2)}
.header h1{font-size:20px;font-weight:700}
.header .formula{font-size:12px;opacity:.85;background:rgba(255,255,255,.12);padding:4px 12px;border-radius:20px}
.main{max-width:1400px;margin:0 auto;padding:24px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);text-align:center}
.kpi-card .label{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-card .value{font-size:26px;font-weight:800}
.kpi-card .sub{font-size:11px;color:var(--sub);margin-top:2px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:12px}
.chart{width:100%;height:340px}
.chart.wide{height:400px}
.table-section{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.table-section h3{font-size:14px;font-weight:600;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f0f0f8;color:var(--sub);font-weight:600;padding:10px 8px;text-align:left;font-size:11px;border-bottom:2px solid var(--border)}
td{padding:8px;border-bottom:1px solid var(--border)}
tr:hover td{background:#f8f8ff}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.tag-red{background:#ffe0e0;color:#d63031}
.tag-green{background:#e6faf5;color:#00b894}
.tag-blue{background:#e8f0fe;color:#0984e3}
.footer{text-align:center;padding:24px;color:var(--sub);font-size:12px;border-top:1px solid var(--border)}
@media(max-width:768px){.chart-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <h1>📊 鲜水湾 · 综合数据看板</h1>
  <span class="formula">笔记诊断 + 搜索词分析 · 双数据源整合</span>
</div>
<div class="main">
  <div class="kpi-row" id="kpiRow"></div>
  <div class="chart-row">
    <div class="chart-card"><h3>🏆 商品GMV排行 TOP5</h3><div class="chart" id="chartProduct"></div></div>
    <div class="chart-card"><h3>👤 作者贡献度</h3><div class="chart" id="chartAuthor"></div></div>
  </div>
  <div class="chart-row">
    <div class="chart-card"><h3>📈 搜索GMV月度趋势</h3><div class="chart" id="chartMonthly"></div></div>
    <div class="chart-card"><h3>📊 笔记推荐衰减分布</h3><div class="chart" id="chartDecay"></div></div>
  </div>
  <div class="chart-row" style="grid-template-columns:1fr">
    <div class="chart-card"><h3>⭐ 长尾金词 TOP10 — 高转化低竞争</h3><div class="chart wide" id="chartGold"></div></div>
  </div>
  <div class="table-section">
    <h3>📋 商品明细表</h3>
    <table><thead><tr><th>商品</th><th>GMV</th><th>订单</th><th>笔记数</th><th>近七日阅读</th></tr></thead><tbody id="prodBody"></tbody></table>
  </div>
</div>
<div class="footer">鲜水湾 · 综合数据看板 · 智数分析专家团 · 管线驱动自动更新</div>

<script>
var D = JSON.parse(document.getElementById('summary-data').textContent);
var S = D.summary;

document.getElementById('kpiRow').innerHTML = [
  {l:'笔记直接GMV',v:'¥'+S.noteGMV.toLocaleString(),s:S.noteOrders+'单 / '+S.notesWithSales+'篇出单'},
  {l:'搜索GMV',v:'¥'+(S.searchGMV/10000).toFixed(1)+'万',s:S.searchOrders+'单 / '+S.searchKeywords+'个词'},
  {l:'搜索/笔记倍率',v:(S.searchGMV/S.noteGMV).toFixed(1)+'×',s:'搜索是笔记直接收入的倍数'},
  {l:'封面CTR均值',v:S.avgCoverCtr+'%',s:'行业平均6% / 优秀10.1%'},
  {l:'推荐中笔记',v:D.decay['推荐中'],s:'发布≤3天，仍有推荐流量'},
  {l:'需补单均值',v:D.avg补单数+'单',s:'使CVR达行业优秀需补'},
].map(function(k){return '<div class="kpi-card"><div class="label">'+k.l+'</div><div class="value">'+k.value+'</div><div class="sub">'+k.sub+'</div></div>';}).join('');

// Product chart
var r1 = echarts.init(document.getElementById('chartProduct'));
r1.setOption({
  tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
  grid:{left:10,right:60,top:10,bottom:40,containLabel:true},
  xAxis:{type:'value',axisLabel:{formatter:'¥{value}'}},
  yAxis:{type:'category',data:D.products.slice(0,5).map(function(p){return p.name;}),axisLabel:{fontSize:10,formatter:function(v){return v.length>15?v.slice(0,14)+'…':v;}}},
  series:[{type:'bar',data:D.products.slice(0,5).map(function(p){return p.gmv;}),itemStyle:{color:'#0984e3'},barMaxWidth:24,
    label:{show:true,position:'right',formatter:function(p){return '¥'+p.value.toLocaleString();},fontSize:11}}
  ]
});

// Author chart
var r2 = echarts.init(document.getElementById('chartAuthor'));
r2.setOption({
  tooltip:{trigger:'axis'},
  legend:{data:['GMV','笔记数'],bottom:0},
  grid:{left:10,right:10,top:10,bottom:40,containLabel:true},
  xAxis:{type:'category',data:D.authors.map(function(a){return a.name.length>8?a.name.slice(0,7)+'…':a.name;})},
  yAxis:[{type:'value',name:'GMV(¥)',axisLabel:{formatter:'¥{value}'}},{type:'value',name:'笔记数'}],
  series:[
    {name:'GMV',type:'bar',data:D.authors.map(function(a){return a.gmv;}),itemStyle:{color:'#0984e3'}},
    {name:'笔记数',type:'line',yAxisIndex:1,data:D.authors.map(function(a){return a.notes;}),itemStyle:{color:'#ff2442'},symbolSize:8}
  ]
});

// Monthly trend
var r3 = echarts.init(document.getElementById('chartMonthly'));
r3.setOption({
  tooltip:{trigger:'axis'},
  legend:{data:['搜索GMV','搜索订单'],bottom:0},
  grid:{left:10,right:10,top:10,bottom:40,containLabel:true},
  xAxis:{type:'category',data:D.monthly.map(function(m){return m.month;})},
  yAxis:[{type:'value',axisLabel:{formatter:'¥{value}'}},{type:'value',name:'订单'}],
  series:[
    {name:'搜索GMV',type:'bar',data:D.monthly.map(function(m){return m.gmv;}),itemStyle:{color:'#0984e3'},barMaxWidth:24},
    {name:'搜索订单',type:'line',yAxisIndex:1,data:D.monthly.map(function(m){return m.orders;}),itemStyle:{color:'#00b894'},symbolSize:8}
  ]
});

// Decay pie
var r4 = echarts.init(document.getElementById('chartDecay'));
r4.setOption({
  tooltip:{trigger:'item'},
  series:[{type:'pie',radius:['50%','75%'],center:['50%','60%'],itemStyle:{borderRadius:6,borderColor:'#fff',borderWidth:2},
    label:{formatter:'{b}\n{d}%',fontSize:13},
    data:[
      {name:'推荐中(≤3天)',value:D.decay['推荐中'],itemStyle:{color:'#00b894'}},
      {name:'搜索续命(>3天)',value:D.decay['搜索续命'],itemStyle:{color:'#e17055'}}
    ]
  }]
});

// Gold keywords
var r5 = echarts.init(document.getElementById('chartGold'));
r5.setOption({
  tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
  legend:{data:['GMV','CVR'],bottom:0},
  grid:{left:10,right:60,top:10,bottom:50,containLabel:true},
  xAxis:{type:'category',data:D.longTailGold.map(function(g){return g.keyword.length>10?g.keyword.slice(0,9)+'…':g.keyword;})},
  yAxis:[{type:'value',name:'GMV(¥)',axisLabel:{formatter:'¥{value}'}},{type:'value',name:'CVR(%)',axisLabel:{formatter:'{value}%'}}],
  series:[
    {name:'GMV',type:'bar',data:D.longTailGold.map(function(g){return g.gmv;}),itemStyle:{color:'#0984e3'},barMaxWidth:18},
    {name:'CVR',type:'line',yAxisIndex:1,data:D.longTailGold.map(function(g){return g.cvr;}),itemStyle:{color:'#ff2442'},symbolSize:8}
  ]
});

// Product table
document.getElementById('prodBody').innerHTML = D.products.map(function(p,i){
  return '<tr><td style="font-weight:600">'+p.name+'</td><td>¥'+p.gmv.toLocaleString()+'</td><td>'+p.orders+'</td><td>'+p.notes+'</td><td>'+p.reads.toLocaleString()+'</td></tr>';
}).join('');

window.addEventListener('resize',function(){r1.resize();r2.resize();r3.resize();r4.resize();r5.resize();});
</script>
</body>
</html>
