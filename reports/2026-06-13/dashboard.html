<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鲜水湾 · 数据仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #f5f6fa;
  --card: #fff;
  --text: #2d3436;
  --sub: #636e72;
  --accent: #ff6b6b;
  --green: #00b894;
  --blue: #0984e3;
  --orange: #fdcb6e;
  --purple: #6c5ce7;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); padding:24px; }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
.header h1 { font-size:24px; font-weight:700; }
.header .period { font-size:13px; color:var(--sub); background:#eee; padding:4px 12px; border-radius:20px; }
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:24px; }
.kpi-card { background:var(--card); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); }
.kpi-card .label { font-size:12px; color:var(--sub); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.kpi-card .value { font-size:28px; font-weight:800; }
.kpi-card .sub { font-size:11px; color:var(--sub); margin-top:4px; }
.chart-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.chart-card { background:var(--card); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); }
.chart-card h3 { font-size:14px; font-weight:600; margin-bottom:12px; color:var(--text); }
.chart { width:100%; height:360px; }
.chart.wide { grid-column:1/-1; }
.insight-bar { background:var(--card); border-radius:var(--radius); padding:20px 24px; box-shadow:var(--shadow); margin-bottom:16px; }
.insight-bar h3 { font-size:14px; font-weight:600; margin-bottom:10px; }
.insight-item { display:flex; align-items:flex-start; gap:8px; margin-bottom:6px; font-size:13px; line-height:1.5; }
.insight-item .dot { width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0; }
.dot.red { background:var(--accent); }
.dot.yellow { background:var(--orange); }
.dot.blue { background:var(--blue); }
.risk-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.risk-high { background:#ffeaa7; color:#d63031; }
.risk-warn { background:#dfe6e9; color:#636e72; }
@media(max-width:768px){ .chart-row { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="header">
  <h1>🥬 鲜水湾 · 经营仪表盘</h1>
  <span class="period">2026年6月 · 小红书食品生鲜</span>
</div>

<div class="kpi-grid" id="kpiGrid"></div>

<div class="chart-row">
  <div class="chart-card"><h3>🏆 商品GMV排行</h3><div class="chart" id="chartProductGMV"></div></div>
  <div class="chart-card"><h3>📊 渠道支付金额占比</h3><div class="chart" id="chartChannelPie"></div></div>
</div>

<div class="chart-row">
  <div class="chart-card"><h3>🔄 渠道转化效率对比</h3><div class="chart" id="chartChannelConv"></div></div>
  <div class="chart-card"><h3>👤 账号贡献度</h3><div class="chart" id="chartAccount"></div></div>
</div>

<div class="chart-row">
  <div class="chart-card"><h3>📉 退款率分布</h3><div class="chart" id="chartRefund"></div></div>
  <div class="chart-card"><h3>📈 新老客结构 (Top渠道)</h3><div class="chart" id="chartNewOld"></div></div>
</div>

<div class="insight-bar" id="insightBar"></div>

<script>
const DATA = {
  "kpi":{"total_gmv":99746,"total_orders":1008,"total_buyers":994,"total_visitors":23086,"total_views":29392,"total_add_cart":3836,"refund_rate_pct":12.06,"avg_aov":64.65,"unique_products":17,"unique_accounts":4},
  "product_top10": [
    {"name":"手剥虾仁·5盒装","gmv":12638,"buyers":158,"orders":161,"aov":79.99,"conv":5.04},
    {"name":"智利三文鱼·8斤","gmv":5581.9,"buyers":33,"orders":34,"aov":169.15,"conv":4.01},
    {"name":"三文鱼扒·轮切","gmv":4717,"buyers":34,"orders":34,"aov":138.74,"conv":3.31},
    {"name":"挪威冰鲜三文鱼","gmv":509.3,"buyers":7,"orders":7,"aov":72.76,"conv":3.02},
    {"name":"厄瓜多尔白虾","gmv":336,"buyers":3,"orders":3,"aov":112,"conv":2.44},
    {"name":"北极甜虾","gmv":316,"buyers":2,"orders":2,"aov":158,"conv":2.33},
    {"name":"盐田虾·有机无抗","gmv":270,"buyers":2,"orders":2,"aov":135,"conv":0.52},
    {"name":"虾滑·大颗粒","gmv":245,"buyers":1,"orders":1,"aov":245,"conv":4.17}
  ],
  "channel_summary": [
    {"name":"综合搜索页","gmv":28404,"buyers":293,"new_pct":85.3,"visit_value":3.47},
    {"name":"关注页","gmv":19184,"buyers":152,"new_pct":76.3,"visit_value":6.53},
    {"name":"发现页","gmv":15572,"buyers":120,"new_pct":77.5,"visit_value":5.67},
    {"name":"订单页","gmv":11289,"buyers":90,"new_pct":70,"visit_value":15.29},
    {"name":"分享","gmv":8605,"buyers":106,"new_pct":79.2,"visit_value":3.75},
    {"name":"\"我\"的页","gmv":8101,"buyers":121,"new_pct":95,"visit_value":1.91},
    {"name":"搜索商品页","gmv":6113,"buyers":76,"new_pct":77.6,"visit_value":3.02},
    {"name":"购物车页","gmv":1722,"buyers":24,"new_pct":70.8,"visit_value":10.85},
    {"name":"其他","gmv":533,"buyers":6,"new_pct":50,"visit_value":9.72},
    {"name":"图片搜索页","gmv":331,"buyers":5,"new_pct":60,"visit_value":5.72},
    {"name":"消息页","gmv":91,"buyers":1,"new_pct":0,"visit_value":3.09},
    {"name":"搜索用户页","gmv":38,"buyers":0,"new_pct":0,"visit_value":2.42},
    {"name":"市集页","gmv":0,"buyers":0,"new_pct":0,"visit_value":0}
  ],
  "account_ranking": [
    {"name":"鲜水湾","gmv":46591,"orders":477,"buyers":421,"clicks":13009,"conv":3.24,"aov":110.67},
    {"name":"婉婉上班吃什么","gmv":15545,"orders":166,"buyers":151,"clicks":7237,"conv":2.09,"aov":102.95},
    {"name":"菲菲上班吃什么","gmv":2860,"orders":32,"buyers":30,"clicks":3433,"conv":0.87,"aov":95.33},
    {"name":"晨晨日记🎀","gmv":3194,"orders":34,"buyers":31,"clicks":1863,"conv":1.66,"aov":103.03}
  ],
  "channel_new_old":[
    {"name":"发现页","new_visit":3222,"old_visit":667,"new_buy":93,"old_buy":27},
    {"name":"综合搜索页","new_visit":3545,"old_visit":402,"new_buy":250,"old_buy":43},
    {"name":"关注页","new_visit":1291,"old_visit":106,"new_buy":116,"old_buy":36},
    {"name":"订单页","new_visit":305,"old_visit":721,"new_buy":63,"old_buy":27},
    {"name":"分享","new_visit":991,"old_visit":94,"new_buy":84,"old_buy":22},
    {"name":"\"我\"的页","new_visit":3870,"old_visit":337,"new_buy":115,"old_buy":6}
  ],
  "insights":[
    {"tag":"red","text":"TOP3商品贡献92%GMV，手剥虾仁单品占12.7%，核心SKU依赖风险高"},
    {"tag":"red","text":"退货率12.06%，盐田虾、青岛鲅鱼退货率>30%，需重点关注品控"},
    {"tag":"yellow","text":"86%支付来自新买家，复购率仅14%，老客运营体系薄弱"},
    {"tag":"yellow","text":"订单页访客价值¥15.29最高（复购场景），但流量占比不足"},
    {"tag":"blue","text":"综合搜索页贡献28.5%GMV，是第一流量+转化渠道"},
    {"tag":"blue","text":"鲜水湾账号贡献40%GMV，婉婉上班吃什么贡献13.4%，双账号驱动"}
  ]
};

(function(){
  // KPI Cards
  const kpis = [
    {label:'总GMV',value:'¥'+DATA.kpi.total_gmv.toLocaleString(),sub:'本月累计'},
    {label:'支付买家',value:DATA.kpi.total_buyers,sub:'人均¥'+Math.round(DATA.kpi.total_gmv/DATA.kpi.total_buyers)},
    {label:'订单数',value:DATA.kpi.total_orders,sub:'客单价¥'+DATA.kpi.avg_aov},
    {label:'访客数',value:DATA.kpi.total_visitors.toLocaleString(),sub:'加购率'+(DATA.kpi.total_add_cart/DATA.kpi.total_visitors*100).toFixed(1)+'%'},
    {label:'退货率',value:DATA.kpi.refund_rate_pct+'%',sub:'退回¥'+(DATA.kpi.total_gmv*DATA.kpi.refund_rate_pct/100).toFixed(0)},
    {label:'活跃商品',value:DATA.kpi.unique_products,sub:DATA.kpi.unique_accounts+'个账号'},
  ];
  document.getElementById('kpiGrid').innerHTML = kpis.map(k=>`<div class="kpi-card"><div class="label">${k.label}</div><div class="value">${k.value}</div><div class="sub">${k.sub}</div></div>`).join('');

  // Chart 1: Product GMV bar
  var c1 = echarts.init(document.getElementById('chartProductGMV'));
  c1.setOption({
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
    grid:{left:160,right:20,top:10,bottom:10},
    yAxis:{type:'category',data:DATA.product_top10.map(p=>p.name.substring(0,8)).reverse(),axisLabel:{fontSize:11}},
    xAxis:{type:'value',axisLabel:{formatter:v=>'¥'+(v/1000).toFixed(0)+'k'}},
    series:[{type:'bar',data:DATA.product_top10.map(p=>p.gmv).reverse(),
      itemStyle:{color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#6c5ce7'},{offset:1,color:'#a29bfe'}])}
    }]
  });

  // Chart 2: Channel Pie
  var c2 = echarts.init(document.getElementById('chartChannelPie'));
  var chData = DATA.channel_summary.filter(c=>c.gmv>0);
  c2.setOption({
    tooltip:{trigger:'item',formatter:'{b}: ¥{c} ({d}%)'},
    series:[{type:'pie',radius:['40%','70%'],center:['50%','55%'],itemStyle:{borderRadius:6,borderColor:'#fff',borderWidth:2},
      label:{formatter:'{b}\n{d}%',fontSize:11},
      data:chData.map(c=>({name:c.name,value:c.gmv}))
    }]
  });

  // Chart 3: Channel Conv Bubble
  var c3 = echarts.init(document.getElementById('chartChannelConv'));
  c3.setOption({
    tooltip:{trigger:'item',formatter:p=>p.name+'<br/>GMV: ¥'+p.value[2]+'<br/>买家: '+p.value[1]+'<br/>访客价值: ¥'+p.value[3]},
    grid:{left:70,right:20,top:10,bottom:30},
    xAxis:{name:'支付买家数',nameLocation:'center',nameGap:40},
    yAxis:{name:'访客价值(¥)',nameLocation:'center',nameGap:40},
    series:[{type:'scatter',symbolSize:v=>Math.sqrt(v[2])/10,
      data:chData.filter(c=>c.gmv>500).map(c=>[c.buyers,c.visit_value,c.gmv,c.visit_value,c.name]),
      itemStyle:{color:'#0984e3'},label:{show:true,formatter:p=>p.value[4],fontSize:10,position:'top'}
    }]
  });

  // Chart 4: Account bar
  var c4 = echarts.init(document.getElementById('chartAccount'));
  c4.setOption({
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
    grid:{left:120,right:20,top:10,bottom:10},
    yAxis:{type:'category',data:DATA.account_ranking.map(a=>a.name).reverse(),axisLabel:{fontSize:11}},
    xAxis:{type:'value',axisLabel:{formatter:v=>'¥'+(v/1000).toFixed(0)+'k'}},
    series:[{type:'bar',data:DATA.account_ranking.map(a=>a.gmv).reverse(),
      itemStyle:{color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#00b894'},{offset:1,color:'#55efc4'}])}
    }]
  });

  // Chart 5: Refund distribution
  var c5 = echarts.init(document.getElementById('chartRefund'));
  c5.setOption({
    tooltip:{trigger:'axis'},
    grid:{left:50,right:20,top:10,bottom:30},
    xAxis:{type:'category',data:['0-10%','10-30%','30-50%','50-100%']},
    yAxis:{type:'value',name:'商品数'},
    series:[{type:'bar',data:[12,3,1,1],
      itemStyle:{color:function(p){
        var colors=['#00b894','#fdcb6e','#e17055','#d63031'];
        return colors[p.dataIndex];
      }},barWidth:'50%'
    }]
  });

  // Chart 6: New vs Returning
  var c6 = echarts.init(document.getElementById('chartNewOld'));
  c6.setOption({
    tooltip:{trigger:'axis'},
    legend:{data:['新访客','老访客','新买家','老买家'],bottom:0},
    grid:{left:50,right:20,top:10,bottom:50},
    xAxis:{type:'category',data:DATA.channel_new_old.map(c=>c.name),axisLabel:{rotate:20,fontSize:10}},
    yAxis:{type:'value'},
    series:[
      {name:'新访客',type:'bar',stack:'visit',data:DATA.channel_new_old.map(c=>c.new_visit),itemStyle:{color:'#74b9ff'}},
      {name:'老访客',type:'bar',stack:'visit',data:DATA.channel_new_old.map(c=>c.old_visit),itemStyle:{color:'#b2bec3'}},
      {name:'新买家',type:'bar',stack:'buyer',data:DATA.channel_new_old.map(c=>c.new_buy),itemStyle:{color:'#0984e3'}},
      {name:'老买家',type:'bar',stack:'buyer',data:DATA.channel_new_old.map(c=>c.old_buy),itemStyle:{color:'#636e72'}},
    ]
  });

  // Insight bar
  document.getElementById('insightBar').innerHTML = '<h3>💡 关键洞察</h3>'+DATA.insights.map(i=>{
    var dotClass = i.tag==='red'?'red':(i.tag==='yellow'?'yellow':'blue');
    var badge = i.tag==='red'?`<span class="risk-badge risk-high">风险</span>`:(i.tag==='yellow'?`<span class="risk-badge risk-warn">关注</span>`:'');
    return `<div class="insight-item"><span class="dot ${dotClass}"></span>${badge} ${i.text}</div>`;
  }).join('');

  window.addEventListener('resize',()=>{c1.resize();c2.resize();c3.resize();c4.resize();c5.resize();c6.resize();});
})();
</script>
</body>
</html>
